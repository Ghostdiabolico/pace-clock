<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pace Clock - Nuoto</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row; /* Layout orizzontale per mettere il tasto a sinistra */
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 20px;
        }

        .clock-container {
            position: relative;
            width: min(92vh, 92vw); /* Massima dimensione possibile */
            height: min(92vh, 92vw);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clock-face {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a3147, #151821);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 80px rgba(0, 0, 0, 0.5);
            border: 8px solid #1a1f3a;
        }

        .number {
            position: absolute;
            font-family: 'Teko', sans-serif;
            font-size: 5.5vmin;
            font-weight: 700;
            color: #fff;
            transform: translate(-50%, -50%);
        }

        .tick {
            position: absolute;
            width: 3px;
            height: 15px;
            background: rgba(255, 255, 255, 0.4);
            top: 4%;
            left: 50%;
            transform-origin: center 46vh; /* Questo valore si adatta alla dimensione */
        }

        .tick.major { height: 25px; width: 4px; background: rgba(255, 255, 255, 0.6); }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
        }

        .hand-black {
            width: 8px;
            height: 42%;
            background: linear-gradient(to top, #00a8ff, #5bc8ff);
            margin-left: -4px;
            z-index: 2;
        }

        .hand-red {
            width: 10px;
            height: 45%;
            background: linear-gradient(to top, #ff3b30, #ff6b5e);
            margin-left: -5px;
            z-index: 3;
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            background: #ff3b30;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 6;
        }

        /* Tasto Reset a sinistra */
        .reset-btn {
            background: linear-gradient(135deg, #ff3b30, #ff6b5e);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 18px;
            text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            writing-mode: vertical-lr; /* Opzionale: rende il tasto verticale se lo spazio è poco */
            text-orientation: upright;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-upload, .info-text { display: none; } /* Nascondiamo il superfluo per Vivi */

        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .reset-btn { writing-mode: horizontal-tb; padding: 10px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="reset-btn" id="resetBtn">R E S E T</button>
        
        <div class="clock-container">
            <div class="clock-face" id="clockFace">
                <div class="hand hand-black" id="blackHand"></div>
                <div class="hand hand-red" id="redHand"></div>
                <div class="center-dot"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io("https://pace-clock-server.onrender.com");
        const clockFace = document.getElementById('clockFace');
        const redHand = document.getElementById('redHand');
        const blackHand = document.getElementById('blackHand');
        const resetBtn = document.getElementById('resetBtn');

        // Genera Quadrante
        for (let i = 0; i < 60; i++) {
            const tick = document.createElement('div');
            tick.className = i % 5 === 0 ? 'tick major' : 'tick';
            tick.style.transform = `rotate(${i * 6}deg)`;
            clockFace.appendChild(tick);

            if (i % 5 === 0) {
                const number = document.createElement('div');
                number.className = 'number';
                number.textContent = i;
                const angle = (i * 6 - 90) * (Math.PI / 180);
                number.style.left = (50 + 40 * Math.cos(angle)) + '%';
                number.style.top = (50 + 40 * Math.sin(angle)) + '%';
                clockFace.appendChild(number);
            }
        }

        let startTime = Date.now();

        // Sync Reset
        socket.on('receive_reset', (newStartTime) => {
            startTime = newStartTime;
        });

        resetBtn.addEventListener('click', () => {
            socket.emit('send_reset');
        });

        function updateClock() {
            const elapsed = Date.now() - startTime;
            const seconds = (elapsed / 1000) % 60;
            redHand.style.transform = `rotate(${seconds * 6}deg)`;
            blackHand.style.transform = `rotate(${((seconds + 30) % 60) * 6}deg)`;
            requestAnimationFrame(updateClock);
        }

        updateClock();
    </script>
</body>
</html>
